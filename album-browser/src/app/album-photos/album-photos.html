<h2>Album Photos</h2>

@if(loading == true){
    <div>Loading photos...</div>
} 
@else {
    <div class="photo-grid">
        @for(photo of photos; track photo.id ){
            <div class="photo-item">
                <img src="photo.thumbnailUrl">
                <p>{{photo.title}}</p>
            </div>
        }
        
    </div>
    <button routerLink="/albums" >Back to Album</button>
}

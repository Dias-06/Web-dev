 <article class="overflow-hidden rounded-2xl max-w-[300px] border border-zinc-200 bg-white shadow-sm">
            <a
            class="block bg-zinc-50"
            [href]="product.link"
            >
            <img
                class="h-56 w-full object-cover object-center p-3"
                [src]="selectedImages[product.id] || product.image"
                [alt]="product.name"
            />
            </a>
            <div class="flex gap-2 p-3 pt-0">
                @for(img of product.images; track img){
                    <img
                        class="h-14 w-14 cursor-pointer rounded-md border object-contain p-1 transition hover:border-amber-400"
                        [src]="img"
                        (click)="setMainImage(img)"
                    />
                }
               
            </div>
            <div class="flex flex-col gap-2 p-4">
            <a
                class="line-clamp-2 text-base font-semibold text-zinc-900 hover:underline"
                [href]="product.link"
                target="_blank"
                rel="noopener"
            >
                {{ product.name }}
            </a>

            <p class="line-clamp-3 text-sm leading-5 text-zinc-600">
                {{ product.description }}
            </p>

            <div class="mt-auto flex items-center justify-between pt-2">
                <span class="text-lg font-bold text-zinc-900">
                {{ product.price}} ₸
                </span>

                <span (click)="counterLikes()" class="rounded-full cursor-pointer bg-amber-100 px-2 py-1 text-xs font-medium text-amber-900">
                ❤️ {{ total_likes}}
                </span>
                <button (click)="deleteById()" class="cursor-pointer px-2 py-1 bg-transparent rounded-[4px] border">Delete</button>
            </div>
                <div class="mt-3 flex gap-2">
                    <a
                        class="inline-flex items-center justify-center rounded-lg border border-zinc-200 px-3 py-2 text-sm font-medium text-zinc-900 hover:bg-zinc-50"
                        [href]="whatsApp()"
                        target="_blank"
                        rel="noopener"
                    >
                        Share WhatsApp
                    </a>

                    <a
                        class="inline-flex items-center justify-center rounded-lg border border-zinc-200 px-3 py-2 text-sm font-medium text-zinc-900 hover:bg-zinc-50"
                        [href]="telegram()"
                        target="_blank"
                        rel="noopener"
                    >
                        Share Telegram
                    </a>
                </div>
            </div>
        </article>

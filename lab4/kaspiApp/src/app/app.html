<main class="mx-auto max-w-360">
  <h1 class="text-5xl">
    Online shop
  </h1>
  <app-categories-list (categorySelected)="selectCategory($any($event))" [selectedCategory]="selectedCategory"></app-categories-list>
  @if(selectedCategory != 0){
    <app-product-list [selectedProducts]="getSelectedProducts()" (onDeleteProduct)="deleteProduct($any($event))"></app-product-list>
  }
  @else {
    <h1 class="text-center text-4xl">Welcome</h1>
  }
</main>
